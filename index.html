<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Bible Music - Uplift your soul through scripture and song.</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700;800&amp;display=swap" rel="stylesheet">
    <link crossorigin="anonymous" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" referrerpolicy="no-referrer" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: { primary: "#FF4500", secondary: "#1F2A44", background: "#FAF6F2" },
                    fontFamily: { "headline": ["Noto Serif", "serif"], "body": ["Noto Serif", "serif"] },
                },
            },
        }
    </script>
    <style> body { background-color: #FAF6F2; -webkit-font-smoothing: antialiased; min-height: 100dvh; } </style>
</head>
<body class="font-body text-[#1F2A44] flex flex-col min-h-screen">
    <main class="flex-grow flex flex-col items-center justify-center px-8 py-20">
        <div class="text-center mb-12 space-y-6">
            <h1 class="text-6xl md:text-8xl font-extrabold text-[#FF4500] tracking-tighter leading-tight">Bible Music</h1>
            <p class="text-xl md:text-2xl text-[#1F2A44] font-medium max-w-sm mx-auto leading-relaxed">Uplift your soul through scripture and song.</p>
        </div>
        <div class="w-full max-w-sm flex flex-col gap-5">
            <button class="w-full bg-[#FF4500] text-white py-5 px-8 rounded-full flex items-center justify-center gap-4 shadow-lg shadow-orange-500/20 active:scale-95 transition-transform duration-200">
                <i class="fa-brands fa-apple text-4xl"></i>
                <div class="text-left leading-tight">
                    <p class="text-[10px] uppercase tracking-widest opacity-90 font-bold">Download on the</p>
                    <p class="text-xl font-bold">App Store</p>
                </div>
            </button>
            <button class="w-full bg-[#FF4500] text-white py-5 px-8 rounded-full flex items-center justify-center gap-4 shadow-lg shadow-orange-500/20 active:scale-95 transition-transform duration-200">
                <i class="fa-brands fa-google-play text-3xl"></i>
                <div class="text-left leading-tight">
                    <p class="text-[10px] uppercase tracking-widest opacity-90 font-bold">Get it on</p>
                    <p class="text-xl font-bold">Google Play</p>
                </div>
            </button>
        </div>
    </main>
    <footer class="bg-[#FAF6F2] flex flex-col items-center gap-4 w-full px-6 py-12">
        <div class="flex gap-8">
            <a class="text-sm text-stone-500 hover:text-[#FF4500] transition-colors duration-200" href="/terms">Terms</a>
            <a class="text-sm text-stone-500 hover:text-[#FF4500] transition-colors duration-200" href="/privacy">Privacy</a>
            <a class="text-sm text-stone-500 hover:text-[#FF4500] transition-colors duration-200" href="/support">Support</a>
        </div>
        <p class="text-sm text-stone-400">© 2026 Bible Music. All rights reserved.</p>
    </footer>
</body>
</html>
